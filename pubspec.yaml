  purchases_ui_flutter: ^10.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^5.0.0
  build_runner: ^2.7.1
  flutter_gen_runner: ^5.11.0
  # flutter_gen: ^5.11.0

flutter_gen:
  output: lib/core/assets-gen/ # Optional (default: lib/gen/)
  line_length: 80 # Optional (default: 80)
  # Optional
  integrations:
    flutter_svg: true
    lottie: true

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/icons/
    - assets/images/

  # Dot env file
    - .env


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_launcher_icon.png"
  min_sdk_android: 21


flutter_native_splash:
  # dart run flutter_native_splash:create
  color: "#ffffff"  ##========[REQUIRED]==========
  color_dark: "#ffffff"
  image: assets/images/splash_logo.png
  image_dark: assets/images/splash_logo.png
  fullscreen: true
  android_12:
    color: "#ffffff"
    color_dark: "#ffffff"
    image: assets/images/splash_logo.png
    icon_background_color: "#ffffff"